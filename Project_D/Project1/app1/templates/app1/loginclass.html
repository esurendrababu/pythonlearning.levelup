{% extends "app1/index.html"%}
{% load static %}

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="">


    <body class="form-v6">
        <div class="page-content">
          <div class="form-v6-content">
            <div class="form-left">
              <img src="{% static 'images/login.jpeg'%}" alt="form" width="570px" height="450px" style="background-size:cover">
            </div>
                      <form method="post" >   
                        {% csrf_token %}
                        <br>
                        <h5 class="h5" style="color:white;  border-radius: 0px 0px 20px 50px;
                        background: -webkit-linear-gradient(left, #0072ff, #8811c5);  
                        padding: 25px;
            text-align:center;
                        padding-right:325px;
                        width: 400px;
                        height: 150px;display:inline;font-weight:10rem;">Login</h5><br><br><br>
                        {% if messages %}

                        {% for message in messages %}
                        <div class="alert alert-info">
                            {{ message }}
                        </div>
                        {% endfor %}
                  
                    {% endif %}
                         <div class="form-right">
                          
                            <div class="form-group">
                                <label for="exampleInputEmail1">Username</label>
                                <input type="text" name="username" class="form-control form-control-sm" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Username" style="margin-left:-20px;">
                            </div>
                            <div class="form-group">
                                <label for="exampleInputPassword1">Password</label>
                                <input type="password" name="password" class="form-control form-control-sm" id="exampleInputPassword1" placeholder="Password" style="margin-left:-20px">
                                <a href="{% url 'app1:password_reset'%}" style="font-size:12px;margin-left:220px;">Forgot password?</a>
        
                            </div>
                            <button type="submit" class="btn btn-primary btn-block mb-2" style="margin-left:-20px">Login</button>
                            
                            <div class="sign-up">
                               <span class="h6" style="color:black">Don't have an account?</span>  <a href="{% url 'app1:register' %}" style="padding-left:10px">Create One</a>
                            </div>
          
                        </div>
                      </div>
                    </div>
                      </form>
                    </div>
                    <style>
                        #hover-underline-animation {
                        display: inline-block;
                        position: relative;
                        color:white;
                      }
                      
                      #hover-underline-animation::after {
                        content: '';
                        position: absolute;
                        width: 100%;
                        transform: scaleX(0);
                        height: 2px;
                        bottom: 0;
                        left: 0;
                        background-color:gold;
                        transform-origin: bottom right;
                        transition: transform 0.25s ease-out;
                      }
                      
                      #hover-underline-animation:hover::after {
                        transform: scaleX(1);
                        transform-origin: bottom left;
                      }
                    </style>
