{% extends "app1/index.html"%}
{% block content%}
{% load static %}

  <div class="jumbotron">
    <img src="{% static 'images/gif1.gif' %}" alt="" style=" margin-left:690px">
    <br>
    <br><div class="d-flex justify-content-center font-weight-bold h1">Thanks for Registering!</div>
    <br>
    <div class="d-flex justify-content-center typewriter"> Please check your email for further instructions on how to complete your account setup. </div>
</div>
<style>
  .typewriter {
      overflow: hidden; /* Ensures the content is not revealed until the animation */
      border-right: .15em solid orange; /* The typwriter cursor */
      white-space: nowrap; /* Keeps the content on a single line */
      margin: 0 auto; /* Gives that scrolling effect as the typing happens */
      letter-spacing: .15em; /* Adjust as needed */
      animation: 
        typing 3.5s steps(40, end),
        blink-caret .75s step-end infinite;
    }
    
    /* The typing effect */
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    
    /* The typewriter cursor effect */
    @keyframes blink-caret {
      from, to { border-color: transparent }
      50% { border-color: orange; }
    }
</style>

<style>
    #hover-underline-animation {
 display: inline-block;
 position: relative;
 color:blue;
}

#hover-underline-animation::after {
 content: '';
 position: absolute;
 width: 100%;
 transform: scaleX(0);
 height: 2px;
 bottom: 0;
 left: 0;
 background-color:gold;
 transform-origin: bottom right;
 transition: transform 0.25s ease-out;
}

#hover-underline-animation:hover::after {
 transform: scaleX(1);
 transform-origin: bottom left;
}

 </style>



{% endblock %}
